# Game Dev Assistant — Windows Release
#
# main への Push で Build → GitHub Release → Setup.exe 公開まで自動化する。
# Secrets: GH_TOKEN は既定の GITHUB_TOKEN で contents: write があれば足りる。
# プライベート依存や外部 PAT が必要な場合のみ PAT を追加する。

name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Windows Setup.exe
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Allow native install scripts (electron/esbuild)
        shell: bash
        run: |
          if npm approve-scripts --help >/dev/null 2>&1; then
            npm approve-scripts electron esbuild || true
          fi
          # electron バイナリが無い場合のフォールバック
          if [ ! -f node_modules/electron/dist/electron.exe ]; then
            node node_modules/electron/install.js || npx --yes electron@34.5.8
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build + electron-builder (NSIS Setup.exe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:publish

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            release/*-Setup.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

      # electron-builder --publish always が Release を作成する。
      # タグ Push でない場合でも latest.yml 付きで上書き公開される。
      - name: Ensure Git tag exists
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG" || true
          fi
